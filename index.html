<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Go AttarOkey - Portal Manajemen Pesantren</title>
    
    <!-- PWA & Mobile Optimization -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#059669" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Go AttarOkey" />
    <link rel="apple-touch-icon" href="/logo.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('Service Worker terdaftar dengan scope:', registration.scope);
            })
            .catch((error) => {
              console.error('Pendaftaran Service Worker gagal:', error);
            });
        });
      }

      // Capture PWA Install Prompt Event
      window.addEventListener('beforeinstallprompt', (e) => {
        // Prevent default mini-infobar on mobile
        e.preventDefault();
        // Stash the event so it can be triggered later
        window.deferredPrompt = e;
        // Dispatch custom event to notify React components
        window.dispatchEvent(new CustomEvent('pwa-installable'));
        console.log('Aplikasi siap diinstal sebagai PWA!');
      });

      // Handle successful installation
      window.addEventListener('appinstalled', (e) => {
        console.log('PWA berhasil diinstal!');
        window.deferredPrompt = null;
        window.dispatchEvent(new CustomEvent('pwa-installed'));
      });
    </script>
  </body>
</html>
